<!DOCTYPE html>
<html>
<head>
  <title>Login - Agrosense</title>
  <style>
    body {
      background: black;
      color: cyan;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      text-shadow: 0 0 20px cyan;
    }

    input {
      display: block;
      margin: 15px auto;
      padding: 10px;
      background: black;
      color: cyan;
      border: 1px solid cyan;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: cyan;
      border: 1px solid cyan;
      cursor: pointer;
    }

    button:hover {
      background: cyan;
      color: black;
    }
  </style>
</head>

<body>

<h1>AGROSENSE LOGIN</h1>

<input id="name" placeholder="Enter Name" required>
<input id="email" placeholder="Enter Email" required>
<input id="address" placeholder="Enter Address" required>
<input id="phone" placeholder="Enter Phone Number" required>

<button onclick="goToShop()">Enter Shop</button>

<script>
function goToShop() {
  localStorage.setItem("name", document.getElementById("name").value);
  localStorage.setItem("email", document.getElementById("email").value);
  localStorage.setItem("address", document.getElementById("address").value);
  localStorage.setItem("phone", document.getElementById("phone").value);

  window.location.href = "shop.html";
}
</script>

</body>
</html>
